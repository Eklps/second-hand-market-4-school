<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>聊天</title>
    <link rel="stylesheet" href="./css/element.css">
    <link href="./css/main.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 顶部导航 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            z-index: 100;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #eee;
            font-size: 17px;
            font-weight: 600;
        }

        .header .header-back-btn {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            cursor: pointer;
            color: #333;
        }

        .header .conn-status {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            color: #999;
        }

        .header .conn-status .dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 3px;
            vertical-align: middle;
        }

        .dot-online {
            background: #52c41a;
        }

        .dot-offline {
            background: #ff4d4f;
        }

        .dot-connecting {
            background: #faad14;
        }

        /* 消息区域 */
        .msg-container {
            position: fixed;
            top: 50px;
            bottom: 56px;
            left: 0;
            right: 0;
            overflow-y: auto;
            padding: 12px 16px;
            -webkit-overflow-scrolling: touch;
        }

        .msg-row {
            display: flex;
            margin-bottom: 14px;
            align-items: flex-start;
        }

        .msg-row.self {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }

        .msg-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .msg-bubble {
            max-width: 65%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
        }

        .msg-row:not(.self) .msg-bubble {
            background: #fff;
            color: #333;
            margin-left: 10px;
            border-top-left-radius: 4px;
        }

        .msg-row.self .msg-bubble {
            background: #1890ff;
            color: #fff;
            margin-right: 10px;
            border-top-right-radius: 4px;
        }

        .msg-time {
            text-align: center;
            font-size: 11px;
            color: #bbb;
            margin: 15px 0 8px;
        }

        /* 底部输入框 */
        .input-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: #fff;
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            padding: 0 12px;
        }

        .input-bar input {
            flex: 1;
            height: 38px;
            border: 1px solid #e8e8e8;
            border-radius: 19px;
            padding: 0 16px;
            font-size: 15px;
            outline: none;
            background: #f5f5f5;
        }

        .input-bar input:focus {
            border-color: #1890ff;
            background: #fff;
        }

        .input-bar .send-btn {
            margin-left: 10px;
            width: 60px;
            height: 36px;
            border-radius: 18px;
            background: #1890ff;
            color: #fff;
            border: none;
            font-size: 14px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .input-bar .send-btn:active {
            background: #096dd9;
        }

        .input-bar .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- 顶部 -->
        <div class="header">
            <div class="header-back-btn" @click="goBack"><i class="el-icon-arrow-left"></i></div>
            <span>{{ otherNickName }}</span>
            <div class="conn-status">
                <span class="dot"
                    :class="{'dot-online': wsStatus==='open', 'dot-offline': wsStatus==='closed', 'dot-connecting': wsStatus==='connecting'}"></span>
                {{ wsStatus === 'open' ? '在线' : wsStatus === 'connecting' ? '连接中' : '离线' }}
            </div>
        </div>

        <!-- 消息列表 -->
        <div class="msg-container" ref="msgContainer">
            <template v-for="(msg, idx) in messages">
                <!-- 时间分隔线：与上条消息间隔超过5分钟时显示 -->
                <div class="msg-time" v-if="shouldShowTime(idx)" :key="'t'+idx">
                    {{ formatMsgTime(msg.createTime) }}
                </div>
                <!-- 消息气泡 -->
                <div class="msg-row" :class="{ self: msg.fromUserId == myUserId }" :key="'m'+idx">
                    <div class="msg-avatar">
                        <img :src="msg.fromUserId == myUserId ? myIcon : otherIcon" alt="">
                    </div>
                    <div class="msg-bubble">{{ msg.content }}</div>
                </div>
            </template>
        </div>

        <!-- 底部输入框 -->
        <div class="input-bar">
            <input v-model="inputMsg" placeholder="输入消息..." @keyup.enter="sendMessage" maxlength="500" ref="inputBox">
            <button class="send-btn" @click="sendMessage" :disabled="!inputMsg.trim() || wsStatus !== 'open'">
                发送
            </button>
        </div>
    </div>

    <script src="./js/vue.js"></script>
    <script src="./js/axios.min.js"></script>
    <script src="./js/element.js"></script>
    <script src="./js/common.js"></script>
    <script>
        const app = new Vue({
            el: "#app",
            data: {
                myUserId: null,
                myIcon: '/imgs/icons/default-icon.png',
                otherUserId: null,
                otherNickName: '聊天',
                otherIcon: '/imgs/icons/default-icon.png',
                messages: [],
                inputMsg: '',
                ws: null,
                wsStatus: 'closed' // 'connecting' | 'open' | 'closed'
            },
            created() {
                // 解析 URL 参数
                this.otherUserId = this.getUrlParam('userId');
                this.otherNickName = decodeURIComponent(this.getUrlParam('nickName') || '聊天');
                let iconParam = this.getUrlParam('icon');
                if (iconParam) this.otherIcon = decodeURIComponent(iconParam);

                // 获取当前登录用户信息
                this.loadMyInfo();
            },
            beforeDestroy() {
                if (this.ws) {
                    this.ws.close();
                }
            },
            methods: {
                getUrlParam(name) {
                    let reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)', 'i');
                    let r = window.location.search.substr(1).match(reg);
                    if (r != null) return r[2];
                    return null;
                },

                loadMyInfo() {
                    axios.get("/user/me")
                        .then(({ data }) => {
                            this.myUserId = data.id;
                            if (data.icon) this.myIcon = data.icon;
                            // 加载历史消息
                            this.loadHistory();
                            // 标记为已读
                            this.markRead();
                            // 建立 WebSocket
                            this.connectWebSocket();
                        })
                        .catch(() => {
                            this.$message.error("请先登录");
                            setTimeout(() => { location.href = "/login.html"; }, 500);
                        });
                },

                loadHistory() {
                    axios.get("/chat/history/" + this.otherUserId)
                        .then(({ data }) => {
                            this.messages = data || [];
                            this.$nextTick(() => this.scrollToBottom());
                        })
                        .catch(console.error);
                },

                markRead() {
                    axios.put("/chat/read/" + this.otherUserId).catch(() => { });
                },

                // =================== WebSocket（带 JWT 鉴权）===================
                connectWebSocket() {
                    let token = sessionStorage.getItem("token");
                    if (!token) {
                        console.warn("无 Token，无法建立 WebSocket 连接");
                        return;
                    }
                    // 去掉 "Bearer " 前缀（如果有的话），query 参数中直接传裸 Token
                    if (token.startsWith("Bearer ")) {
                        token = token.substring(7);
                    }

                    // 构建 WebSocket URL
                    let protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                    // 后端运行在 8081 端口（通过 nginx 反代也可以直接连）
                    let wsUrl = protocol + '//' + location.hostname + ':8081/ws/chat?token=' + token;

                    this.wsStatus = 'connecting';
                    this.ws = new WebSocket(wsUrl);

                    this.ws.onopen = () => {
                        console.log('WebSocket 已连接');
                        this.wsStatus = 'open';
                    };

                    this.ws.onmessage = (event) => {
                        let msg = JSON.parse(event.data);
                        // 只展示与当前聊天对象相关的消息
                        if (msg.fromUserId == this.otherUserId || msg.toUserId == this.otherUserId) {
                            this.messages.push(msg);
                            this.$nextTick(() => this.scrollToBottom());
                            // 收到消息后标记已读
                            if (msg.fromUserId == this.otherUserId) {
                                this.markRead();
                            }
                        }
                    };

                    this.ws.onclose = (event) => {
                        console.log('WebSocket 已关闭:', event.reason);
                        this.wsStatus = 'closed';
                        // 非正常关闭时尝试重连
                        if (event.code !== 1000) {
                            setTimeout(() => this.connectWebSocket(), 3000);
                        }
                    };

                    this.ws.onerror = (error) => {
                        console.error('WebSocket 错误:', error);
                        this.wsStatus = 'closed';
                    };
                },

                sendMessage() {
                    let content = this.inputMsg.trim();
                    if (!content || this.wsStatus !== 'open') return;

                    let msg = {
                        toUserId: parseInt(this.otherUserId),
                        content: content,
                        type: 0  // 0=文字
                    };

                    // 通过 WebSocket 发送
                    this.ws.send(JSON.stringify(msg));

                    // 本地立刻展示（服务端不会回推给发送者自己）
                    this.messages.push({
                        fromUserId: this.myUserId,
                        toUserId: parseInt(this.otherUserId),
                        content: content,
                        createTime: new Date().toISOString(),
                        type: 0,
                        isRead: 0
                    });

                    this.inputMsg = '';
                    this.$nextTick(() => {
                        this.scrollToBottom();
                        this.$refs.inputBox.focus();
                    });
                },

                // =================== 辅助方法 ===================
                scrollToBottom() {
                    let container = this.$refs.msgContainer;
                    if (container) {
                        container.scrollTop = container.scrollHeight;
                    }
                },

                shouldShowTime(idx) {
                    if (idx === 0) return true;
                    let curr = new Date(this.messages[idx].createTime).getTime();
                    let prev = new Date(this.messages[idx - 1].createTime).getTime();
                    return (curr - prev) > 5 * 60 * 1000; // 超过5分钟显示时间
                },

                formatMsgTime(timeStr) {
                    if (!timeStr) return '';
                    let date = new Date(timeStr);
                    let now = new Date();
                    let hours = date.getHours().toString().padStart(2, '0');
                    let mins = date.getMinutes().toString().padStart(2, '0');
                    let time = hours + ':' + mins;

                    if (date.toDateString() === now.toDateString()) {
                        return time;
                    }
                    let yesterday = new Date(now);
                    yesterday.setDate(yesterday.getDate() - 1);
                    if (date.toDateString() === yesterday.toDateString()) {
                        return '昨天 ' + time;
                    }
                    return (date.getMonth() + 1) + '/' + date.getDate() + ' ' + time;
                },

                goBack() {
                    history.back();
                }
            }
        });
    </script>
</body>

</html>
