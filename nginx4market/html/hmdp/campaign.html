<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>福利盲盒秒杀</title>
    <!-- 引入样式 -->
    <link rel="stylesheet" href="./css/element.css">
    <link href="./css/shop-detail.css" rel="stylesheet">
    <link href="./css/main.css" rel="stylesheet">
    <style type="text/css">
        .campaign-header {
            background-image: linear-gradient(135deg, #ff6633, #ff9966);
            padding: 30px 20px;
            color: white;
            text-align: center;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 4px 10px rgba(255, 102, 51, 0.3);
            position: relative;
        }

        .campaign-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .campaign-subtitle {
            font-size: 14px;
            opacity: 0.9;
        }

        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 20px;
            color: white;
            cursor: pointer;
        }

        .voucher-list {
            padding: 15px;
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="campaign-header">
            <div class="back-btn" @click="goBack"><i class="el-icon-arrow-left"></i></div>
            <div class="campaign-title">🎁 官方直营福利抢购</div>
            <div class="campaign-subtitle">1元秒杀盲盒 & 绝版补贴好物，手慢无！</div>
        </div>

        <div class="voucher-list">
            <!-- 秒杀商品/代金券列表 -->
            <div class="voucher-box" v-for="v in vouchers" :key="v.id" v-if="!isEnd(v)">
                <div class="voucher-circle">
                    <div class="voucher-b">￥{{v.payValue / 100}}</div>
                    <div class="voucher-w">秒杀价</div>
                </div>
                <div class="voucher-left">
                    <div class="voucher-title">{{v.title}}</div>
                    <div class="voucher-subtitle">{{v.subTitle}}</div>
                    <div class="voucher-price">原价 ￥<span>{{v.actualValue / 100}}</span></div>
                </div>
                <div class="voucher-right">
                    <div v-if="v.type" class="seckill-box">
                        <div class="voucher-btn" :class="{'disable-btn': isNotBegin(v) || v.stock < 1 || v.isClaimed}"
                            @click="seckill(v)">
                            {{isNotBegin(v) ? '尚未开始' : (v.isClaimed ? '已抢到' : (v.stock < 1 ? '已抢光' : '立即抢购' ))}} </div>
                                <div class="seckill-stock">剩余 <span>{{v.stock}}</span> 件</div>
                                <div class="seckill-time">{{formatTime(v)}}</div>
                        </div>
                        <div class="voucher-btn" v-else>立即抢购</div>
                    </div>
                </div>
                <div v-if="vouchers.length === 0" style="text-align:center;color:#999;padding:40px 0;">
                    暂无秒杀活动，敬请期待~
                </div>
            </div>
        </div>
        <script src="./js/vue.js"></script>
        <script src="./js/axios.min.js"></script>
        <!-- 引入组件库 -->
        <script src="./js/element.js"></script>
        <script src="./js/common.js"></script>
        <script>
            const app = new Vue({
                el: "#app",
                data: {
                    util,
                    vouchers: []
                },
                created() {
                    // 查询属于官方预设店铺（假设ID为1000作为官方商店，或者直接拉取特定店铺下的全平台优惠）
                    // 您可以根据数据库里预设的关联抢购活动的productId来传值，这里默认写 1
                    let shopId = util.getUrlParam("id") || 1;
                    this.queryVoucher(shopId);
                },
                methods: {
                    goBack() {
                        history.back();
                    },
                    queryVoucher(shopId) {
                        axios.get("/voucher/list/" + shopId)
                            .then(({ data }) => {
                                this.vouchers = data;
                            })
                            .catch(this.$message.error);
                    },
                    formatTime(v) {
                        let b = new Date(v.beginTime);
                        let e = new Date(v.endTime);
                        return (b.getMonth() + 1) + "月" + b.getDate() + "日 "
                            + b.getHours() + ":" + this.formatMinutes(b.getMinutes())
                            + " ~ "
                            + e.getHours() + ":" + this.formatMinutes(e.getMinutes());
                    },
                    formatMinutes(m) {
                        if (m < 10) m = "0" + m;
                        return m;
                    },
                    isNotBegin(v) {
                        return new Date(v.beginTime).getTime() > new Date().getTime();
                    },
                    isEnd(v) {
                        return new Date(v.endTime).getTime() < new Date().getTime();
                    },
                    seckill(v) {
                        if (!token) {
                            this.$message.error("请先登录");
                            // 未登录，跳转
                            setTimeout(() => {
                                location.href = "/login.html"
                            }, 200);
                            return;
                        }
                        if (this.isNotBegin(v)) {
                            this.$message.error("抢购尚未开始！");
                            return;
                        }
                        if (this.isEnd(v)) {
                            this.$message.error("抢购已经结束！");
                            return;
                        }
                        if (v.stock < 1) {
                            this.$message.error("库存不足，下次早点来哦！");
                            return;
                        }
                        let id = v.id;
                        // 秒杀抢购
                        axios.post("/voucher-order/seckill/" + id)
                            .then(({ data }) => {
                                this.$message.success("抢购成功，订单号：" + data);
                                // 本地更新库存显示和抢购状态
                                v.stock--;
                                v.isClaimed = true;
                            })
                            .catch(err => {
                                this.$message.error(err || "抢购失败");
                            });
                    }
                }
            });
        </script>
</body>

</html>
