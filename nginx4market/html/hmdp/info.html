<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>大学城闲置星球</title>
  <!-- 引入样式 -->
  <link rel="stylesheet" href="./css/element.css">
  <link href="./css/main.css" rel="stylesheet">
  <link href="./css/info.css" rel="stylesheet">

  <style type="text/css">
    .el-tabs--bottom .el-tabs__item.is-bottom:nth-child(2),
    .el-tabs--bottom .el-tabs__item.is-top:nth-child(2),
    .el-tabs--top .el-tabs__item.is-bottom:nth-child(2),
    .el-tabs--top .el-tabs__item.is-top:nth-child(2) {
      padding-left: 15px;
    }

    .el-tabs,
    .el-tab-pane {
      height: 100%;
    }

    .el-tabs__header {
      height: 10%;
    }

    .el-tabs__content {
      height: 90%;
    }

    /* 签到卡片 */
    .sign-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 8px 15px;
      padding: 12px 16px;
      background: linear-gradient(135deg, #fff5f0, #fff0e8);
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(255, 102, 51, 0.12);
    }

    .sign-info {
      display: flex;
      align-items: center;
      font-size: 14px;
      color: #333;
    }

    .sign-fire {
      font-size: 20px;
      margin-right: 8px;
    }

    .sign-days {
      font-weight: bold;
      color: #ff6633;
      margin: 0 4px;
      font-size: 18px;
    }

    .sign-btn {
      padding: 6px 18px;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #ff6633, #ff4500);
      box-shadow: 0 2px 6px rgba(255, 69, 0, 0.3);
      transition: all 0.25s ease;
    }

    .sign-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(255, 69, 0, 0.4);
    }

    .sign-btn:active {
      transform: translateY(0);
    }

    .sign-btn.signed {
      background: #ccc;
      box-shadow: none;
      cursor: default;
    }

    .sign-btn.signed:hover {
      transform: none;
    }
  </style>

</head>

<body>
  <div id="app">
    <div class="header">
      <div class="header-back-btn" @click="goBack"><i class="el-icon-arrow-left"></i></div>
      <div class="header-title">个人主页&nbsp;&nbsp;&nbsp;</div>
    </div>
    <div class="basic">
      <div class="basic-icon">
        <img :src="user.icon || '/imgs/icons/default-icon.png'" alt="">
      </div>
      <div class="basic-info">
        <div class="name">{{user.nickName}}</div>
        <span>{{info.city || '未知'}}</span>
        <div class="edit-btn" @click="toEdit">
          编辑资料
        </div>
      </div>
      <div class="logout-btn" @click="logout">
        退出登录
      </div>
    </div>
    <div class="introduce" @click="toEdit" style="cursor: pointer;">
      <span v-if="info.introduce">{{info.introduce}}</span>
      <span v-else>添加个人简介，让大家更好的认识你</span>
      <i class="el-icon-edit"></i>
    </div>
    <!-- 签到卡片 -->
    <div class="sign-card">
      <div class="sign-info">
        <span class="sign-fire">🔥</span>
        <span>已连续签到 <span class="sign-days">{{signCount}}</span> 天</span>
      </div>
      <button class="sign-btn" :class="{signed: signed}" @click="doSign" :disabled="signed">
        {{signed ? '已签到 ✓' : '签到'}}
      </button>
    </div>
    <div class="content">
      <el-tabs v-model="activeName" @tab-click="handleClick">
        <el-tab-pane label="笔记" name="1">
          <div v-for="b in blogs" :key="b.id" class="blog-item">
            <div class="blog-img"><img :src="b.images.split(',')[0]" alt=""></div>
            <div class="blog-info">
              <div class="blog-title">{{b.title}}</div>
              <div class="blog-liked"><img src="/imgs/thumbup.png" alt=""> {{b.liked}}</div>
              <div class="blog-comments"><i class="el-icon-chat-dot-round"></i> {{b.comments}}</div>
            </div>
          </div>
        </el-tab-pane>
        <el-tab-pane label="评价" name="2">评价</el-tab-pane>
        <el-tab-pane label="粉丝" name="3">
          <div
            style="padding: 12px 15px; color: #666; font-size: 14px; background-color: #fcfcfc; border-bottom: 1px solid #eee;">
            已获得 <span style="color: #ff5f3e; font-weight: bold;">{{followersTotal}}</span> 位粉丝
          </div>
          <div class="follow-info" v-for="u in followers" :key="u.id">
            <div class="follow-info-icon" @click="toOtherInfo(u.id)">
              <img :src="u.icon || '/imgs/icons/default-icon.png'" alt="">
            </div>
            <div class="follow-info-name">
              <div class="name">{{u.nickName}}</div>
            </div>
            <div class="follow-info-btn" @click="toOtherInfo(u.id)">
              去主页看看
            </div>
          </div>
        </el-tab-pane>
        <el-tab-pane label="关注" name="4">
          <div
            style="padding: 12px 15px; color: #666; font-size: 14px; background-color: #fcfcfc; border-bottom: 1px solid #eee;">
            已关注 <span style="color: #ff5f3e; font-weight: bold;">{{followingsTotal}}</span> 人
          </div>
          <div class="follow-info" v-for="u in followings" :key="u.id">
            <div class="follow-info-icon" @click="toOtherInfo(u.id)">
              <img :src="u.icon || '/imgs/icons/default-icon.png'" alt="">
            </div>
            <div class="follow-info-name">
              <div class="name">{{u.nickName}}</div>
            </div>
            <div class="follow-info-btn" @click="toOtherInfo(u.id)">
              去主页看看
            </div>
          </div>
        </el-tab-pane>
      </el-tabs>
    </div>
    <foot-bar :active-btn="4"></foot-bar>
  </div>
  <script src="./js/vue.js"></script>
  <script src="./js/axios.min.js"></script>
  <!-- 引入组件库 -->
  <script src="./js/element.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/footer.js"></script>
  <script>
    const app = new Vue({
      el: "#app",
      data: {
        user: "",
        activeName: "1",
        info: {},
        signCount: 0,
        signed: false,
        blogs: [],
        blogs2: [], // 关注的人的播客
        params: {
          minTime: 0, // 上一次拉取到的时间戳
          offset: 0, // 偏移量
        },
        count: 5,
        isReachBottom: false,
        followers: [], // 粉丝列表
        followersTotal: 0,
        followings: [], // 关注列表
        followingsTotal: 0,
      },
      created() {
        this.queryUser();
        this.querySignCount();
        // 从编辑页 history.back() 回来时，浏览器 bfcache 不会重新执行 JS
        // 通过 pageshow 事件监听来刷新数据
        window.addEventListener('pageshow', (e) => {
          if (e.persisted) {
            this.queryUser();
            this.querySignCount();
          }
        });
      },
      methods: {
        load() {
          this.count += 2;
        },
        queryBlogs() {
          axios.get("/post/of/me")
            .then(({ data }) => this.blogs = data)
            .catch(this.$message.error)
        },
        queryFollowers() {
          axios.get("/follow/list/followers?current=1")
            .then(({ data, total }) => {
              this.followers = data || [];
              this.followersTotal = total || this.followers.length;
            })
            .catch(this.$message.error)
        },
        queryFollowings() {
          axios.get("/follow/list/followings?current=1")
            .then(({ data, total }) => {
              this.followings = data || [];
              this.followingsTotal = total || this.followings.length;
            })
            .catch(this.$message.error)
        },
        queryBlogsOfFollow(clear) {
          if (clear) {
            this.params.offset = 0;
            this.params.minTime = new Date().getTime() + 1;
          }
          let { minTime, offset: os } = this.params;
          axios.get("/post/of/follow", {
            params: { offset: os, lastId: minTime || new Date().getTime() + 1 }
          })
            .then(({ data }) => {
              if (!data) {
                return;
              }
              let { list, ...params } = data;
              list.forEach(b => b.img = b.images.split(",")[0])
              this.blogs2 = clear ? list : this.blogs2.concat(list);
              this.params = params;
            })
            .catch(e => console.log(e))
        },
        queryUser() {
          // 查询用户信息
          axios.get("/user/me")
            .then(({ data }) => {
              // 保存用户
              this.user = data;
              // 查询用户详情
              this.queryUserInfo();
              // 查询用户笔记
              this.queryBlogs();
            })
            .catch(err => {
              location.href = "login.html"
            })
        },
        goBack() {
          history.back();
        },
        queryUserInfo() {
          axios.get("/user/info/" + this.user.id)
            .then(({ data }) => {
              if (!data) {
                return
              }
              // 保存用户详情
              // 保存用户详情
              // 使用深拷贝强制触发 Vue 响应式更新，确保 Tab Label 中的 info.fans 等能被观察到
              this.info = JSON.parse(JSON.stringify(data));
              // 保存到本地
              sessionStorage.setItem("userInfo", JSON.stringify(data))
            })
            .catch(err => {
              this.$message.error(err);
            })
        },
        toEdit() {
          location.href = 'info-edit.html'
        },
        logout() {
          axios.post("/user/logout")
            .then(() => {
              // 清理session
              sessionStorage.removeItem("token")
              // 跳转
              location.href = "/"
            })
            .catch(this.$message.error)
        },
        handleClick(r) {
          if (r.name === '3') {
            this.queryFollowers();
          } else if (r.name === '4') {
            this.queryFollowings();
          }
        },
        toOtherInfo(id) {
          location.href = "other-info.html?id=" + id;
        },
        addLike(b) {
          axios.put("/post/like/" + b.id)
            .then(({ data }) => {
              this.queryBlogById(b);
            })
            .catch(err => {
              this.$message.error(err)
            })
        },
        queryBlogById(b) {
          axios.get("/post/" + b.id)
            .then(({ data }) => {
              b.liked = data.liked;
              b.isLike = data.isLike;
            })
            .catch(() => {
              this.$message.error
              b.liked++;
            })
        },
        onScroll(e) {
          let scrollTop = e.target.scrollTop;
          let offsetHeight = e.target.offsetHeight;
          let scrollHeight = e.target.scrollHeight;
          if (scrollTop === 0) {
            // 到顶部了，查询一次
            this.queryBlogsOfFollow(true);
          } else if (scrollTop + offsetHeight + 1 > scrollHeight && !this.isReachBottom) {
            this.isReachBottom = true
            // 再次查询下一页数据
            this.queryBlogsOfFollow();
          } else {
            this.isReachBottom = false
          }
        },
        // ========== 签到 ==========
        querySignCount() {
          axios.get("/user/sign/count")
            .then(({ data }) => {
              this.signCount = data || 0;
              // 连续天数 > 0 说明今天已经签到过
              if (this.signCount > 0) {
                this.signed = true;
              }
            })
            .catch(() => {
              this.signCount = 0;
            })
        },
        doSign() {
          if (this.signed) return;
          axios.post("/user/sign")
            .then(({ data }) => {
              if (data === '今日已签到，请勿重复签到') {
                this.signed = true;
                this.$message.warning(data);
              } else {
                this.signed = true;
                this.$message.success(data || '签到成功！');
              }
              this.querySignCount();
            })
            .catch((err) => {
              this.$message.error(err || '签到失败');
            })
        }
      },

    })
  </script>
</body>

</html>
