<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>黑马点评</title>
  <!-- 引入样式 -->
  <link rel="stylesheet" href="./css/element.css">
  <link href="./css/main.css" rel="stylesheet">
  <link href="./css/info.css" rel="stylesheet">

  <style type="text/css">
    .el-tabs--bottom .el-tabs__item.is-bottom:nth-child(2),
    .el-tabs--bottom .el-tabs__item.is-top:nth-child(2),
    .el-tabs--top .el-tabs__item.is-bottom:nth-child(2),
    .el-tabs--top .el-tabs__item.is-top:nth-child(2) {
      padding-left: 15px;
    }

    .el-tabs,
    .el-tab-pane {
      height: 100%;
    }

    .el-tabs__header {
      height: 10%;
    }

    .el-tabs__content {
      height: 90%;
    }

    /* 签到卡片 */
    .sign-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 8px 15px;
      padding: 12px 16px;
      background: linear-gradient(135deg, #fff5f0, #fff0e8);
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(255, 102, 51, 0.12);
    }

    .sign-info {
      display: flex;
      align-items: center;
      font-size: 14px;
      color: #333;
    }

    .sign-fire {
      font-size: 20px;
      margin-right: 8px;
    }

    .sign-days {
      font-weight: bold;
      color: #ff6633;
      margin: 0 4px;
      font-size: 18px;
    }

    .sign-btn {
      padding: 6px 18px;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #ff6633, #ff4500);
      box-shadow: 0 2px 6px rgba(255, 69, 0, 0.3);
      transition: all 0.25s ease;
    }

    .sign-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(255, 69, 0, 0.4);
    }

    .sign-btn:active {
      transform: translateY(0);
    }

    .sign-btn.signed {
      background: #ccc;
      box-shadow: none;
      cursor: default;
    }

    .sign-btn.signed:hover {
      transform: none;
    }
  </style>

</head>

<body>
  <div id="app">
    <div class="header">
      <div class="header-back-btn" @click="goBack"><i class="el-icon-arrow-left"></i></div>
      <div class="header-title">个人主页&nbsp;&nbsp;&nbsp;</div>
    </div>
    <div class="basic">
      <div class="basic-icon">
        <img :src="user.icon || '/imgs/icons/default-icon.png'" alt="">
      </div>
      <div class="basic-info">
        <div class="name">{{user.nickName}}</div>
        <span>{{info.city || '未知'}}</span>
        <div class="edit-btn" @click="toEdit">
          编辑资料
        </div>
      </div>
      <div class="logout-btn" @click="logout">
        退出登录
      </div>
    </div>
    <div class="introduce" @click="toEdit" style="cursor: pointer;">
      <span v-if="info.introduce">{{info.introduce}}</span>
      <span v-else>添加个人简介，让大家更好的认识你</span>
      <i class="el-icon-edit"></i>
    </div>
    <!-- 签到卡片 -->
    <div class="sign-card">
      <div class="sign-info">
        <span class="sign-fire">🔥</span>
        <span>已连续签到 <span class="sign-days">{{signCount}}</span> 天</span>
      </div>
      <button class="sign-btn" :class="{signed: signed}" @click="doSign" :disabled="signed">
        {{signed ? '已签到 ✓' : '签到'}}
      </button>
    </div>
    <div class="content">
      <el-tabs v-model="activeName" @tab-click="handleClick">
        <el-tab-pane label="笔记" name="1">
          <div v-for="b in blogs" :key="b.id" class="blog-item">
            <div class="blog-img"><img :src="b.images.split(',')[0]" alt=""></div>
            <div class="blog-info">
              <div class="blog-title">{{b.title}}</div>
              <div class="blog-liked"><img src="/imgs/thumbup.png" alt=""> {{b.liked}}</div>
              <div class="blog-comments"><i class="el-icon-chat-dot-round"></i> {{b.comments}}</div>
            </div>
          </div>
        </el-tab-pane>
        <el-tab-pane label="评价" name="2">评价</el-tab-pane>
        <el-tab-pane label="粉丝(0)" name="3">粉丝(0)</el-tab-pane>
        <el-tab-pane label="关注(0)" name="4">
          <div class="blog-list" @scroll="onScroll">
            <div class="blog-box" v-for="b in blogs2" :key="b.id">
              <div class="blog-img2" @click="toBlogDetail(b)"><img :src="b.img" alt=""></div>
              <div class="blog-title">{{b.title}}</div>
              <div class="blog-foot">
                <div class="blog-user-icon"><img :src="b.icon || '/imgs/icons/default-icon.png'" alt=""></div>
                <div class="blog-user-name">{{b.name}}</div>
                <div class="blog-liked" @click="addLike(b)">
                  <svg t="1646634642977" class="icon" viewBox="0 0 1024 1024" version="1.1"
                    xmlns="http://www.w3.org/2000/svg" p-id="2187" width="14" height="14">
                    <path
                      d="M160 944c0 8.8-7.2 16-16 16h-32c-26.5 0-48-21.5-48-48V528c0-26.5 21.5-48 48-48h32c8.8 0 16 7.2 16 16v448zM96 416c-53 0-96 43-96 96v416c0 53 43 96 96 96h96c17.7 0 32-14.3 32-32V448c0-17.7-14.3-32-32-32H96zM505.6 64c16.2 0 26.4 8.7 31 13.9 4.6 5.2 12.1 16.3 10.3 32.4l-23.5 203.4c-4.9 42.2 8.6 84.6 36.8 116.4 28.3 31.7 68.9 49.9 111.4 49.9h271.2c6.6 0 10.8 3.3 13.2 6.1s5 7.5 4 14l-48 303.4c-6.9 43.6-29.1 83.4-62.7 112C815.8 944.2 773 960 728.9 960h-317c-33.1 0-59.9-26.8-59.9-59.9v-455c0-6.1 1.7-12 5-17.1 69.5-109 106.4-234.2 107-364h41.6z m0-64h-44.9C427.2 0 400 27.2 400 60.7c0 127.1-39.1 251.2-112 355.3v484.1c0 68.4 55.5 123.9 123.9 123.9h317c122.7 0 227.2-89.3 246.3-210.5l47.9-303.4c7.8-49.4-30.4-94.1-80.4-94.1H671.6c-50.9 0-90.5-44.4-84.6-95l23.5-203.4C617.7 55 568.7 0 505.6 0z"
                      p-id="2188" :fill="b.isLike ? '#ff6633' : '#82848a'"></path>
                  </svg>
                  {{b.liked}}
                </div>
              </div>
            </div>
          </div>
        </el-tab-pane>
      </el-tabs>
    </div>
    <foot-bar :active-btn="4"></foot-bar>
  </div>
  <script src="./js/vue.js"></script>
  <script src="./js/axios.min.js"></script>
  <!-- 引入组件库 -->
  <script src="./js/element.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/footer.js"></script>
  <script>
    const app = new Vue({
      el: "#app",
      data: {
        user: "",
        activeName: "1",
        info: {},
        signCount: 0,
        signed: false,
        blogs: [],
        blogs2: [], // 关注的人的播客
        params: {
          minTime: 0, // 上一次拉取到的时间戳
          offset: 0, // 偏移量
        },
        count: 5,
        isReachBottom: false,
      },
      created() {
        this.queryUser();
        this.querySignCount();
        // 从编辑页 history.back() 回来时，浏览器 bfcache 不会重新执行 JS
        // 通过 pageshow 事件监听来刷新数据
        window.addEventListener('pageshow', (e) => {
          if (e.persisted) {
            this.queryUser();
            this.querySignCount();
          }
        });
      },
      methods: {
        load() {
          this.count += 2;
        },
        queryBlogs() {
          axios.get("/post/of/me")
            .then(({ data }) => this.blogs = data)
            .catch(this.$message.error)
        },
        queryBlogsOfFollow(clear) {
          if (clear) {
            this.params.offset = 0;
            this.params.minTime = new Date().getTime() + 1;
          }
          let { minTime, offset: os } = this.params;
          axios.get("/post/of/follow", {
            params: { offset: os, lastId: minTime || new Date().getTime() + 1 }
          })
            .then(({ data }) => {
              if (!data) {
                return;
              }
              let { list, ...params } = data;
              list.forEach(b => b.img = b.images.split(",")[0])
              this.blogs2 = clear ? list : this.blogs2.concat(list);
              this.params = params;
            })
            .catch(e => console.log(e))
        },
        queryUser() {
          // 查询用户信息
          axios.get("/user/me")
            .then(({ data }) => {
              // 保存用户
              this.user = data;
              // 查询用户详情
              this.queryUserInfo();
              // 查询用户笔记
              this.queryBlogs();
            })
            .catch(err => {
              location.href = "login.html"
            })
        },
        goBack() {
          history.back();
        },
        queryUserInfo() {
          axios.get("/user/info/" + this.user.id)
            .then(({ data }) => {
              if (!data) {
                return
              }
              // 保存用户详情
              this.info = data;
              // 保存到本地
              sessionStorage.setItem("userInfo", JSON.stringify(data))
            })
            .catch(err => {
              this.$message.error(err);
            })
        },
        toEdit() {
          location.href = 'info-edit.html'
        },
        logout() {
          axios.post("/user/logout")
            .then(() => {
              // 清理session
              sessionStorage.removeItem("token")
              // 跳转
              location.href = "/"
            })
            .catch(this.$message.error)
        },
        handleClick(r) {
          if (r.name === '4') {
            this.queryBlogsOfFollow(true);
          }
        },
        addLike(b) {
          axios.put("/post/like/" + b.id)
            .then(({ data }) => {
              this.queryBlogById(b);
            })
            .catch(err => {
              this.$message.error(err)
            })
        },
        queryBlogById(b) {
          axios.get("/post/" + b.id)
            .then(({ data }) => {
              b.liked = data.liked;
              b.isLike = data.isLike;
            })
            .catch(() => {
              this.$message.error
              b.liked++;
            })
        },
        onScroll(e) {
          let scrollTop = e.target.scrollTop;
          let offsetHeight = e.target.offsetHeight;
          let scrollHeight = e.target.scrollHeight;
          if (scrollTop === 0) {
            // 到顶部了，查询一次
            this.queryBlogsOfFollow(true);
          } else if (scrollTop + offsetHeight + 1 > scrollHeight && !this.isReachBottom) {
            this.isReachBottom = true
            // 再次查询下一页数据
            this.queryBlogsOfFollow();
          } else {
            this.isReachBottom = false
          }
        },
        // ========== 签到 ==========
        querySignCount() {
          axios.get("/user/sign/count")
            .then(({ data }) => {
              this.signCount = data || 0;
              // 连续天数 > 0 说明今天已经签到过
              if (this.signCount > 0) {
                this.signed = true;
              }
            })
            .catch(() => {
              this.signCount = 0;
            })
        },
        doSign() {
          if (this.signed) return;
          axios.post("/user/sign")
            .then(({ data }) => {
              if (data === '今日已签到，请勿重复签到') {
                this.signed = true;
                this.$message.warning(data);
              } else {
                this.signed = true;
                this.$message.success(data || '签到成功！');
              }
              this.querySignCount();
            })
            .catch((err) => {
              this.$message.error(err || '签到失败');
            })
        }
      },

    })
  </script>
</body>

</html>
