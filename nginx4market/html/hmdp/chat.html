<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>聊天 - 大学城闲置星球</title>
    <link rel="stylesheet" href="./css/element.css">
    <link href="./css/main.css" rel="stylesheet">
    <style>
        body {
            background-color: #f7f8fa;
            margin: 0;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 顶部导航 */
        .chat-header {
            padding: 12px 16px;
            background: white;
            display: flex;
            align-items: center;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
            z-index: 10;
        }

        .back-btn {
            font-size: 20px;
            color: #333;
            cursor: pointer;
            margin-right: 15px;
        }

        .target-user-info {
            display: flex;
            align-items: center;
            flex: 1;
        }

        .target-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 10px;
        }

        .target-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        /* 聊天区域 */
        .chat-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 15px;
            background: #f0f2f5;
        }

        .msg-item {
            display: flex;
            margin-bottom: 20px;
            align-items: flex-start;
        }

        .msg-item.mine {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
        }

        .msg-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
            margin: 0 12px;
            word-break: break-all;
        }

        .msg-item.other .msg-bubble {
            background: white;
            color: #333;
            border-top-left-radius: 2px;
        }

        .msg-item.mine .msg-bubble {
            background: #ff6633;
            color: white;
            border-top-right-radius: 2px;
        }

        .msg-time {
            font-size: 11px;
            color: #bbb;
            text-align: center;
            margin-bottom: 15px;
        }

        /* 输入区域 */
        .chat-input-bar {
            background: white;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            border-top: 1px solid #eee;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        .input-box {
            flex: 1;
            background: #f5f5f5;
            border-radius: 20px;
            padding: 8px 16px;
            border: none;
            outline: none;
            font-size: 15px;
        }

        .send-btn {
            margin-left: 12px;
            background: #ff6633;
            color: white;
            border: none;
            width: 50px;
            height: 32px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
        }

        .send-btn:active {
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="chat-header">
            <div class="back-btn" @click="goBack"><i class="el-icon-arrow-left"></i></div>
            <div class="target-user-info">
                <img :src="targetUser.icon || '/imgs/icons/default-icon.png'" class="target-avatar">
                <span class="target-name">{{targetUser.nickName || '在线好友'}}</span>
            </div>
        </div>

        <!-- 消息滚动区 -->
        <div class="chat-content" ref="chatBox">
            <div v-for="(m, index) in messages" :key="m.id">
                <!-- 展示时间（如果与上一条间隔超过5分钟） -->
                <div class="msg-time" v-if="showTime(m, index)">{{formatTime(m.createTime)}}</div>

                <div class="msg-item" :class="{mine: m.fromUserId == user.id, other: m.fromUserId != user.id}">
                    <img :src="m.fromUserId == user.id ? (user.icon || '/imgs/icons/default-icon.png') : (targetUser.icon || '/imgs/icons/default-icon.png')"
                        class="msg-avatar">
                    <div class="msg-bubble">{{m.content}}</div>
                </div>
            </div>
        </div>

        <!-- 底部输入框 -->
        <div class="chat-input-bar">
            <input type="text" class="input-box" v-model="inputMsg" placeholder="发消息..." @keyup.enter="sendMsg">
            <button class="send-btn" @click="sendMsg">发送</button>
        </div>
    </div>

    <script src="./js/vue.js"></script>
    <script src="./js/axios.min.js"></script>
    <script src="./js/element.js"></script>
    <script src="./js/common.js"></script>
    <script>
        const app = new Vue({
            el: "#app",
            data() {
                return {
                    user: {}, // 当前用户
                    targetUser: { id: null, nickName: '', icon: '' }, // 聊天对象
                    messages: [], // 历史+实时消息
                    inputMsg: '',
                    socket: null
                }
            },
            created() {
                const toId = util.getUrlParam("toId");
                const name = util.getUrlParam("name");
                const icon = util.getUrlParam("icon");

                this.targetUser.id = toId;
                // 排除 undefined 字符串干扰
                this.targetUser.nickName = (name && name !== 'undefined') ? name : '星球居民';
                this.targetUser.icon = (icon && icon !== 'undefined') ? icon : '';

                this.init();
            },
            methods: {
                async init() {
                    // 1. 获取当前用户
                    try {
                        const { data } = await axios.get("/user/me");
                        this.user = data;
                        if (!this.user) {
                            location.href = "/login.html";
                            return;
                        }

                        // 2. 加载历史记录
                        this.loadHistory();

                        // 3. 建立 WebSocket 连接
                        this.connectWebSocket();

                        // 4. 标记已读
                        axios.put("/chat/read/" + this.targetUser.id);
                    } catch (e) {
                        this.$message.error("初始化失败");
                    }
                },
                loadHistory() {
                    axios.get("/chat/history/" + this.targetUser.id)
                        .then(({ data }) => {
                            this.messages = data;
                            this.scrollToBottom();
                        });
                },
                connectWebSocket() {
                    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                    // 优先尝试直连后端 8081 端口，规避 Nginx WebSocket 配置问题
                    const backendHost = window.location.hostname + ":8081";
                    this.socket = new WebSocket(`${protocol}//${backendHost}/ws/chat/${this.user.id}`);

                    this.socket.onmessage = (event) => {
                        const msg = JSON.parse(event.data);
                        // 只处理当前对话窗口的消息
                        if (msg.fromUserId == this.targetUser.id || msg.fromUserId == this.user.id) {
                            this.messages.push(msg);
                            this.scrollToBottom();
                            // 如果是对方发来的，立即标记已读
                            if (msg.fromUserId == this.targetUser.id) {
                                axios.put("/chat/read/" + this.targetUser.id);
                            }
                        }
                    };

                    this.socket.onclose = () => {
                        console.log("WebSocket connection closed, retrying...");
                        setTimeout(() => this.connectWebSocket(), 3000);
                    };
                },
                sendMsg() {
                    if (!this.inputMsg.trim()) return;

                    const msg = {
                        toUserId: this.targetUser.id,
                        content: this.inputMsg,
                        type: 0
                    };

                    // 通过 WebSocket 发送
                    if (this.socket && this.socket.readyState === WebSocket.OPEN) {
                        this.socket.send(JSON.stringify(msg));

                        // 本地立即上屏预览 (WebSocketServer 会持久化并可能推回确认，或者在此模拟)
                        // 为了简单和实时性，这里我们等待服务器推回消息或手动添加一条占位
                        const localMsg = {
                            fromUserId: this.user.id,
                            toUserId: this.targetUser.id,
                            content: this.inputMsg,
                            createTime: new Date().toISOString()
                        };
                        this.messages.push(localMsg);
                        this.inputMsg = '';
                        this.scrollToBottom();
                    } else {
                        this.$message.error("连接已断开，请刷新重试");
                    }
                },
                scrollToBottom() {
                    this.$nextTick(() => {
                        const box = this.$refs.chatBox;
                        box.scrollTop = box.scrollHeight;
                    });
                },
                showTime(m, index) {
                    if (index === 0) return true;
                    const prev = this.messages[index - 1];
                    const diff = new Date(m.createTime) - new Date(prev.createTime);
                    return diff > 5 * 60 * 1000; // 5分钟间隔
                },
                formatTime(time) {
                    if (!time) return '';
                    const date = new Date(time);
                    return date.getHours() + ":" + (date.getMinutes() < 10 ? '0' + date.getMinutes() : date.getMinutes());
                },
                goBack() { history.back(); }
            }
        });
    </script>
</body>

</html>
